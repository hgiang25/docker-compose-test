name: "Terraform Destroy EKS & VPC"

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Gõ "DESTROY" để xác nhận xóa toàn bộ hạ tầng'
        required: true
        default: "no"

env:
  AWS_REGION: "ap-southeast-1"
  EKS_CLUSTER_NAME: "voting-cluster"
  TF_WORKING_DIR: "./infrastructure/environments/dev"

jobs:
  destroy:
    name: "Clean up and Destroy"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    if: github.event.inputs.confirm_destroy == 'DESTROY'

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-1

      - uses: hashicorp/setup-terraform@v3

      - name: 📦 Terraform Init
        run: terraform init

      # Connect EKS
      - name: ☸️ Connect to EKS Cluster
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }} || true

      # Verify access
      - name: Verify cluster access
        run: kubectl get nodes || echo "Cluster not accessible"

      # Cleanup k8s
      - name: 🧹 Clean up Kubernetes Resources
        run: |
          kubectl delete svc --all --all-namespaces --wait=true || true
          kubectl delete ingress --all --all-namespaces --wait=true || true
          kubectl delete pvc --all --all-namespaces || true
          echo "Waiting AWS cleanup..."
          sleep 60

      # Destroy EKS first (retry)
      - name: 💥 Terraform Destroy - Target EKS
        run: |
          terraform destroy -target="module.eks" -auto-approve || \
          terraform destroy -target="module.eks" -auto-approve

      # Destroy all
      - name: 🧨 Terraform Destroy - All
        run: terraform destroy -auto-approve
