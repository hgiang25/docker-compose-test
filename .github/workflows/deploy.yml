# .github/workflows/deploy.yml
name: Deploy App to EKS

on:
  push:
    paths:
      - "vote/**"
      - "result/**"
      - "worker/**"
      - "k8s-specifications/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 🔐 Docker login
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🐳 Build & push
      - name: Build & Push images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/vote-app:latest ./vote
          docker build -t ${{ secrets.DOCKER_USERNAME }}/result-app:latest ./result
          docker build -t ${{ secrets.DOCKER_USERNAME }}/worker-app:latest ./worker

          docker push ${{ secrets.DOCKER_USERNAME }}/vote-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/result-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/worker-app:latest

      # ☁️ AWS login
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-1

      # 🔗 Connect EKS
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ap-southeast-1 --name voting-cluster

      # 🚀 Deploy
      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s-specifications/

      # 🔄 Restart để pull latest
      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/vote
          kubectl rollout restart deployment/result
          kubectl rollout restart deployment/worker

      # ✅ Verify
      - name: Check rollout
        run: |
          kubectl rollout status deployment/vote
          kubectl rollout status deployment/result
          kubectl rollout status deployment/worker
