name: Build & Deploy to Kubernetes

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔐 Login Docker Hub
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🐳 Build images
      - name: Build images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/vote-app:${{ github.sha }} ./vote
          docker build -t ${{ secrets.DOCKER_USERNAME }}/result-app:${{ github.sha }} ./result
          docker build -t ${{ secrets.DOCKER_USERNAME }}/worker-app:${{ github.sha }} ./worker

      # 📤 Push images
      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/vote-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/result-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/worker-app:${{ github.sha }}

      - name: Update image tag
        run: |
          sed -i "s|REPLACE_TAG|${{ github.sha }}|g" k8s-specifications/*.yaml

      # ☁️ AWS login
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-1

      # 🔗 Connect Kubernetes
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ap-southeast-1 --name voting-cluster

      # 🚀 Deploy
      - name: Deploy to Kubernetes
        run: kubectl apply -f k8s-specifications/
