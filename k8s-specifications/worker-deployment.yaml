apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: hgyang25/worker-app:REPLACE_TAG
          imagePullPolicy: Always
          env:
            - name: REDIS_HOST
              value: redis
            - name: DB_HOST
              value: db
